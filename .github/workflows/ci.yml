name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    # Only test on Go 1.25.x

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.25.x"

    - name: Verify dependencies
      run: go mod verify

    - name: Build
      run: go build -v ./...



    - name: Run tests with race detector
      run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./cmd/herd ./internal/... ./proxy ./worker.go ./pool.go ./options.go


  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.24.x"
        cache: false # golangci-lint-action handles its own caching

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        args: --timeout=5m
