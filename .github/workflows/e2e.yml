name: E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Run Python E2E Test Harness
    runs-on: ubuntu-latest

    steps:
    - name: Checkout codebase
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.24.x"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"

    - name: Install Python dependencies
      working-directory: ./tests/e2e
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run E2E Test Suite (pytest)
      working-directory: ./tests/e2e
      run: |
        pytest -v -s
