network:
  control_socket: /tmp/herd.sock
  data_bind: 127.0.0.1:8080
worker:
  command: 	["npx", "playwright", "run-server", "--port", "{{.Port}}", "--host", "127.0.0.1"]
  env:
    - FOO=bar
resources:
  min_workers: 1
  max_workers: 4
  memory_limit_mb: 512
  cpu_limit_cores: 1
  pids_limit: 100
  ttl: 10m
  health_interval: 5s
  worker_reuse: true
  insecure_sandbox: true
telemetry:
  log_format: json
  metrics_path: /metrics