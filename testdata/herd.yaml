network:
  control_socket: /tmp/herd.sock
  data_bind: 127.0.0.1:8080
storage:
  state_dir: /tmp/herd-storage
  snapshotter_name: devmapper
  namespace: herd
worker:
  # command: ["ls", "-l", "/sys/class/net/"]
  command: ["ping", "google.com"] 
  env:
    - FOO=bar
resources:
  target_idle: 1
  max_workers: 100
  memory_limit_mb: 512
  cpu_limit_cores: 1
  pids_limit: 100
  ttl: 10m
  absolute_ttl: 1h
  heartbeat_grace: 30s
  data_timeout: 5m
  health_interval: 5s
  insecure_sandbox: true
telemetry:
  log_format: json
  metrics_path: /metrics
